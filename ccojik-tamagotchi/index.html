<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>꼬직 다마고치</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --cream: #FBF6EC;
    --ivory: #FFFDF8;
    --beige: #D9C7A7;
    --beige-deep: #C4AE86;
    --warmgray: #8E8A86;
    --warmgray-deep: #6F6B67;
    --blush: #F5A9B0;
    --ink: #4A423A;
    --ink-soft: #8B8177;
    --shadow: 24px 24px 48px rgba(158,138,102,.20), -12px -12px 32px rgba(255,255,255,.9);
    --shadow-sm: 8px 8px 18px rgba(158,138,102,.18), -6px -6px 14px rgba(255,255,255,.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 30% 15%, #FFFDF8 0%, transparent 55%),
      radial-gradient(circle at 80% 90%, #F6EEDD 0%, transparent 50%),
      var(--cream);
  }

  body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 12px; }

  /* 9:16 세로 프레임 */
  .phone {
    position: relative;
    width: min(420px, 96vw);
    aspect-ratio: 9 / 16;
    max-height: 96dvh;
    background: linear-gradient(160deg, var(--ivory), var(--cream));
    border-radius: 40px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 26px 22px 24px;
    opacity: 0; pointer-events: none;
    transform: scale(.98);
    transition: opacity .35s ease, transform .35s ease;
  }
  .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

  h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .sub { color: var(--ink-soft); font-size: 14px; font-weight: 500; margin-top: 6px; }

  /* ===== 선택 화면 ===== */
  #selectScreen { justify-content: center; text-align: center; gap: 8px; }
  #selectScreen .title-wrap { margin-bottom: 22px; }
  .pick-row { display: flex; gap: 16px; margin-top: 12px; }
  .pick-card {
    flex: 1; background: var(--ivory);
    border-radius: 28px; padding: 18px 12px 20px;
    box-shadow: var(--shadow-sm);
    cursor: pointer; border: 3px solid transparent;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s;
  }
  .pick-card:hover { transform: translateY(-6px); }
  .pick-card:active { transform: scale(.96); }
  .pick-card .avatar { width: 118px; height: 118px; margin: 0 auto 10px; }
  .pick-card .name { font-weight: 800; font-size: 18px; }
  .pick-card .role { color: var(--ink-soft); font-size: 12.5px; margin-top: 3px; font-weight: 500; }
  .pick-card.sasu:hover { border-color: var(--beige); }
  .pick-card.busasu:hover { border-color: var(--warmgray); }

  /* ===== 게임 화면 ===== */
  #gameScreen { padding-top: 20px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; }
  .char-name { font-weight: 800; font-size: 19px; }
  .char-name span { color: var(--ink-soft); font-weight: 600; font-size: 13px; margin-left: 4px; }
  .btn-reset {
    background: transparent; border: none; color: var(--ink-soft);
    font-size: 12px; font-weight: 600; cursor: pointer; padding: 6px 8px;
    border-radius: 12px; font-family: inherit;
  }
  .btn-reset:active { background: rgba(0,0,0,.04); }

  .stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; min-height: 0;
  }
  .avatar-big {
    width: 190px; height: 190px;
    filter: drop-shadow(10px 18px 22px rgba(158,138,102,.28));
    animation: idle 3.4s ease-in-out infinite;
    transform-origin: 50% 90%;
  }
  .avatar-img { width: 100%; height: 100%; object-fit: contain; display: block; }
  /* 두 캐릭터가 한 장에 있는 combined 이미지를 좌/우로 크롭 */
  .avatar-img.cover { object-fit: cover; border-radius: 24px; }
  .avatar-img.pos-left  { object-position: 12% center; }
  .avatar-img.pos-right { object-position: 84% center; }
  @keyframes idle {
    0%,100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-8px) rotate(-1deg); }
  }
  .avatar-big.bounce { animation: bounce .55s cubic-bezier(.28,.84,.42,1); }
  @keyframes bounce {
    0% { transform: translateY(0) scale(1,1); }
    30% { transform: translateY(-26px) scale(.94,1.08); }
    55% { transform: translateY(0) scale(1.08,.9); }
    75% { transform: translateY(-8px) scale(.98,1.03); }
    100% { transform: translateY(0) scale(1,1); }
  }
  .avatar-big.tilt { animation: tilt .5s ease; }
  @keyframes tilt {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(7deg); }
    60% { transform: rotate(-6deg); }
  }
  .avatar-big.shake { animation: shake .5s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-7px) rotate(-2deg); }
    50% { transform: translateX(7px) rotate(2deg); }
    80% { transform: translateX(-4px); }
  }

  .speech {
    background: var(--ivory);
    border-radius: 22px;
    padding: 13px 20px;
    box-shadow: var(--shadow-sm);
    font-size: 15px; font-weight: 700;
    text-align: center; max-width: 92%;
    position: relative;
    transition: transform .2s ease;
  }
  .speech::after {
    content: ""; position: absolute; left: 50%; bottom: -9px;
    width: 18px; height: 18px; background: var(--ivory);
    transform: translateX(-50%) rotate(45deg);
    box-shadow: 6px 6px 12px rgba(158,138,102,.10);
  }
  .speech.pop { transform: scale(1.06); }

  /* 스탯 */
  .stats { display: flex; flex-direction: column; gap: 9px; padding: 4px 2px 14px; }
  .stat { display: flex; align-items: center; gap: 10px; }
  .stat .lbl { width: 46px; font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .track {
    flex: 1; height: 15px; background: #EFE7D6;
    border-radius: 999px; overflow: hidden;
    box-shadow: inset 3px 3px 6px rgba(158,138,102,.16), inset -2px -2px 5px rgba(255,255,255,.7);
  }
  .fill {
    height: 100%; width: 50%; border-radius: 999px;
    transition: width .45s cubic-bezier(.3,.9,.4,1), background .3s;
  }
  .stat .val { width: 30px; text-align: right; font-size: 12px; font-weight: 700; color: var(--ink-soft); }
  .fill.hunger  { background: linear-gradient(90deg, #E8C68A, #D9A85C); }
  .fill.stress  { background: linear-gradient(90deg, #F5A9B0, #E87D86); }
  .fill.tension { background: linear-gradient(90deg, #A9D8C0, #6FBF9A); }
  .fill.loyalty { background: linear-gradient(90deg, #C7B7E8, #9E86D9); }

  /* 버튼 */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .act {
    border: none; cursor: pointer; font-family: inherit;
    background: var(--ivory);
    border-radius: 22px; padding: 15px 8px 13px;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .act .emoji { font-size: 24px; }
  .act .txt { font-size: 14px; font-weight: 800; color: var(--ink); }
  .act .desc { font-size: 10.5px; font-weight: 600; color: var(--ink-soft); }
  .act:active {
    transform: scale(.94) translateY(2px);
    box-shadow: inset 5px 5px 12px rgba(158,138,102,.18), inset -4px -4px 10px rgba(255,255,255,.75);
  }
  .act.feed   { border-bottom: 4px solid #E8C68A; }
  .act.leave  { border-bottom: 4px solid #A9D8C0; }
  .act.praise { border-bottom: 4px solid var(--blush); }
  .act.over   { border-bottom: 4px solid var(--warmgray); }

  /* ===== 게임오버 ===== */
  #overScreen { justify-content: center; align-items: center; text-align: center; gap: 14px; }
  #overScreen .avatar { width: 150px; height: 150px; margin-bottom: 4px; filter: grayscale(.5) drop-shadow(6px 10px 16px rgba(0,0,0,.15)); animation: falldown .8s ease; }
  @keyframes falldown { 0% { transform: translateY(-20px) rotate(-8deg); opacity:0; } 100% { transform: translateY(0) rotate(0); opacity:1; } }
  #overScreen h1 { font-size: 30px; }
  #overScreen .msg { color: var(--ink-soft); font-size: 15px; font-weight: 600; line-height: 1.5; }

  .primary-btn {
    margin-top: 6px;
    border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(160deg, var(--beige), var(--beige-deep));
    color: #fff; font-weight: 800; font-size: 16px;
    padding: 15px 34px; border-radius: 22px;
    box-shadow: var(--shadow-sm);
    transition: transform .14s ease;
  }
  .primary-btn:active { transform: scale(.95); }

  .credit { text-align:center; font-size:11px; color:var(--ink-soft); opacity:.7; padding-bottom:2px; font-weight:500; }
</style>
</head>
<body>
<div class="phone">

  <!-- 선택 화면 -->
  <section class="screen active" id="selectScreen">
    <div class="title-wrap">
      <h1>꼬직 다마고치</h1>
      <p class="sub">키울 팀원을 골라주세요 🐣</p>
    </div>
    <div class="pick-row">
      <div class="pick-card sasu" data-char="sasu">
        <div class="avatar" id="pickSasu"></div>
        <div class="name">사수</div>
        <div class="role">갈색 곱슬 · 베이지</div>
      </div>
      <div class="pick-card busasu" data-char="busasu">
        <div class="avatar" id="pickBusasu"></div>
        <div class="name">부사수</div>
        <div class="role">갈색 단발 · 그레이</div>
      </div>
    </div>
    <p class="credit" style="margin-top:26px;">밥 주고 칭찬하며 무사히 퇴근시켜 주세요</p>
  </section>

  <!-- 게임 화면 -->
  <section class="screen" id="gameScreen">
    <div class="top-bar">
      <div class="char-name" id="charName">사수 <span>사원증 착용</span></div>
      <button class="btn-reset" id="btnReset">캐릭터 변경</button>
    </div>

    <div class="stage">
      <div class="speech" id="speech">출근했습니다.</div>
      <div class="avatar-big" id="avatar"></div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><span class="lbl">배고픔</span><div class="track"><div class="fill hunger"  id="fHunger"></div></div><span class="val" id="vHunger">0</span></div>
      <div class="stat"><span class="lbl">스트레스</span><div class="track"><div class="fill stress"  id="fStress"></div></div><span class="val" id="vStress">0</span></div>
      <div class="stat"><span class="lbl">텐션</span><div class="track"><div class="fill tension" id="fTension"></div></div><span class="val" id="vTension">0</span></div>
      <div class="stat"><span class="lbl">애사심</span><div class="track"><div class="fill loyalty" id="fLoyalty"></div></div><span class="val" id="vLoyalty">0</span></div>
    </div>

    <div class="actions">
      <button class="act feed"   data-act="feed"><span class="emoji">🍚</span><span class="txt">밥 주기</span><span class="desc">배고픔↓ 텐션↑</span></button>
      <button class="act leave"  data-act="leave"><span class="emoji">🏃</span><span class="txt">퇴근시키기</span><span class="desc">스트레스↓↓ 애사심↓</span></button>
      <button class="act praise" data-act="praise"><span class="emoji">👏</span><span class="txt">칭찬하기</span><span class="desc">텐션↑ 애사심↑</span></button>
      <button class="act over"   data-act="overtime"><span class="emoji">🌙</span><span class="txt">야근시키기</span><span class="desc">애사심↑ 스트레스↑↑</span></button>
    </div>
  </section>

  <!-- 게임오버 -->
  <section class="screen" id="overScreen">
    <div class="avatar" id="overAvatar"></div>
    <h1>퇴사했습니다</h1>
    <p class="msg" id="overMsg">스트레스가 한계를 넘었어요.<br>그동안 고생 많으셨습니다 🙏</p>
    <button class="primary-btn" id="btnRestart">다시 시작</button>
  </section>

</div>

<script>
"use strict";

/* ---------- 캐릭터 SVG (3D 토이 피규어 무드) ---------- */
function charSVG(type) {
  const jacket = type === "sasu" ? "#D9C7A7" : "#8E8A86";
  const jacketDark = type === "sasu" ? "#C4AE86" : "#6F6B67";
  const hair = "#8A5E3B", hairDark = "#6E4A2C";
  const skin = "#F2D3B8", skinShade = "#E4BE9E";
  const hairPath = type === "sasu"
    // 곱슬 장발
    ? `<path d="M50 26 C22 26 16 54 20 78 C13 74 12 92 22 96 C20 108 30 116 34 112
             C34 92 40 84 40 84 C40 60 46 46 62 44 C66 44 66 44 62 44
             C80 44 86 60 86 84 C86 84 92 92 92 112 C96 116 106 108 104 96
             C114 92 113 74 106 78 C110 54 104 26 76 26 Z" fill="${hair}"/>
       <path d="M24 80 C22 90 24 100 30 106 C28 92 30 84 30 84 Z" fill="${hairDark}" opacity=".5"/>
       <path d="M102 80 C104 90 102 100 96 106 C98 92 96 84 96 84 Z" fill="${hairDark}" opacity=".5"/>
       <circle cx="26" cy="70" r="7" fill="${hair}"/><circle cx="100" cy="70" r="7" fill="${hair}"/>
       <circle cx="30" cy="92" r="6" fill="${hair}"/><circle cx="96" cy="92" r="6" fill="${hair}"/>`
    // 단발
    : `<path d="M50 26 C28 26 24 50 24 74 C24 86 26 96 30 104 L38 104
             C36 90 38 78 38 70 C40 54 50 48 63 48 C76 48 86 54 88 70
             C88 78 90 90 88 104 L96 104 C100 96 102 86 102 74 C102 50 98 26 76 26 Z" fill="${hair}"/>
       <path d="M40 48 C48 42 78 42 86 48 C80 40 46 40 40 48 Z" fill="${hairDark}" opacity=".5"/>`;

  return `
  <svg viewBox="0 0 126 150" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <radialGradient id="j_${type}" cx="40%" cy="30%" r="80%">
        <stop offset="0%" stop-color="${jacket}"/><stop offset="100%" stop-color="${jacketDark}"/>
      </radialGradient>
      <radialGradient id="s_${type}" cx="40%" cy="35%" r="75%">
        <stop offset="0%" stop-color="${skin}"/><stop offset="100%" stop-color="${skinShade}"/>
      </radialGradient>
    </defs>
    <ellipse cx="63" cy="142" rx="34" ry="6" fill="#000" opacity=".07"/>
    <!-- 몸통 자켓 -->
    <path d="M30 150 C30 112 42 100 63 100 C84 100 96 112 96 150 Z" fill="url(#j_${type})"/>
    <path d="M63 100 L63 150" stroke="${jacketDark}" stroke-width="2" opacity=".5"/>
    <path d="M52 101 L63 118 L74 101 Z" fill="${skin}" opacity=".9"/>
    <!-- 사원증 목걸이 -->
    <path d="M56 102 C58 118 60 122 63 128 C66 122 68 118 70 102" fill="none" stroke="#4A423A" stroke-width="2.4" opacity=".8"/>
    <rect x="57" y="126" width="12" height="16" rx="2.5" fill="#F7F3EA" stroke="#4A423A" stroke-width="1.4"/>
    <rect x="59" y="130" width="8" height="2" rx="1" fill="#B9AE9B"/>
    <rect x="59" y="134" width="6" height="2" rx="1" fill="#D8CFBF"/>
    <!-- 머리 -->
    <circle cx="63" cy="66" r="40" fill="url(#s_${type})"/>
    ${hairPath}
    <!-- 볼터치 -->
    <ellipse cx="42" cy="76" rx="8" ry="5.5" fill="#F5A9B0" opacity=".55"/>
    <ellipse cx="84" cy="76" rx="8" ry="5.5" fill="#F5A9B0" opacity=".55"/>
    <!-- 눈 -->
    <circle cx="50" cy="66" r="4.6" fill="#3A322B"/>
    <circle cx="76" cy="66" r="4.6" fill="#3A322B"/>
    <circle cx="51.6" cy="64.2" r="1.5" fill="#fff"/>
    <circle cx="77.6" cy="64.2" r="1.5" fill="#fff"/>
    <!-- 입 & 수염 살짝 -->
    <path d="M57 82 Q63 88 69 82" fill="none" stroke="#7A5A44" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M52 88 Q63 96 74 88" fill="none" stroke="${hair}" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  </svg>`;
}

/* ---------- 캐릭터 이미지 (있으면 실제 이미지, 없으면 위 SVG) ---------- */
const ASSETS = {
  sasu:   { url: "sasu.png",   ok: false },
  busasu: { url: "busasu.png", ok: false },
};
// 두 캐릭터가 함께 있는 이미지 1장 (개별 파일이 없을 때 자동으로 좌/우 크롭)
const COMBINED = { url: "characters.jpg", ok: false };

function avatarMarkup(type) {
  if (ASSETS[type].ok)
    return `<img class="avatar-img" src="${ASSETS[type].url}" alt="${type}">`;
  if (COMBINED.ok) {
    const pos = type === "sasu" ? "pos-left" : "pos-right";
    return `<img class="avatar-img cover ${pos}" src="${COMBINED.url}" alt="${type}">`;
  }
  return charSVG(type);
}
function refreshAvatars() {
  $("pickSasu").innerHTML = avatarMarkup("sasu");
  $("pickBusasu").innerHTML = avatarMarkup("busasu");
  if (state) {
    $("avatar").innerHTML = avatarMarkup(state.char);
    $("overAvatar").innerHTML = avatarMarkup(state.char);
  }
}
function probeAssets() {
  Object.keys(ASSETS).forEach(k => {
    const img = new Image();
    img.onload = () => { if (img.naturalWidth > 0) { ASSETS[k].ok = true; shownAvatarKey = null; refreshAvatars(); } };
    img.src = ASSETS[k].url;
  });
  const c = new Image();
  c.onload = () => { if (c.naturalWidth > 0) { COMBINED.ok = true; shownAvatarKey = null; refreshAvatars(); } };
  c.src = COMBINED.url;
}

/* ---------- 상태 ---------- */
const STORE_KEY = "ccojik-tamagotchi-v1";
const TICK_MS = 30000;
const clamp = v => Math.max(0, Math.min(100, Math.round(v)));

let state = null;   // { char, hunger, stress, tension, loyalty }
let tickTimer = null;

const $ = id => document.getElementById(id);

function defaultStats(char) {
  return { char, hunger: 30, stress: 20, tension: 70, loyalty: 50 };
}

function save() {
  if (state) localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)); }
  catch (e) { return null; }
}

/* ---------- 화면 전환 ---------- */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

/* ---------- 상태 메시지 (회사 유머, 우선순위 순) ---------- */
function statusMessage(s) {
  if (s.stress >= 80) return "퇴사 마려움...";
  if (s.hunger >= 75) return "점심 뭐 먹지 그 생각뿐임";
  if (s.tension <= 15) return "번아웃 직전... 커피 좀";
  if (s.loyalty <= 15) return "이 회사 왜 다니지";
  if (s.stress >= 60) return "슬슬 야근각이라 불안함";
  if (s.tension >= 80) return "오늘 컨디션 좋은데?";
  if (s.loyalty >= 85) return "회사가 곧 나야";
  if (s.hunger >= 55) return "배에서 알림 울림 🔔";
  if (s.stress <= 20 && s.tension >= 55) return "워라밸 지켜지는 중 ☕";
  return "평범하게 근무 중...";
}

/* ---------- 렌더 ---------- */
function setFill(fillId, valId, v) {
  $(fillId).style.width = v + "%";
  $(valId).textContent = v;
}
let shownAvatarKey = null;
function render() {
  const s = state;
  const key = s.char + ":" + ASSETS[s.char].ok + ":" + COMBINED.ok;   // 캐릭터/이미지 바뀔 때만 다시 그림 (깜빡임 방지)
  if (shownAvatarKey !== key) {
    $("avatar").innerHTML = avatarMarkup(s.char);
    shownAvatarKey = key;
  }
  $("charName").innerHTML = (s.char === "sasu" ? "사수" : "부사수") + " <span>사원증 착용</span>";
  setFill("fHunger", "vHunger", s.hunger);
  setFill("fStress", "vStress", s.stress);
  setFill("fTension", "vTension", s.tension);
  setFill("fLoyalty", "vLoyalty", s.loyalty);
  const msg = statusMessage(s);
  const sp = $("speech");
  if (sp.textContent !== msg) {
    sp.textContent = msg;
    sp.classList.add("pop");
    setTimeout(() => sp.classList.remove("pop"), 200);
  }
}

/* ---------- 애니메이션 ---------- */
function animate(kind) {
  const a = $("avatar");
  a.classList.remove("bounce", "tilt", "shake");
  void a.offsetWidth; // reflow
  a.classList.add(kind);
  setTimeout(() => a.classList.remove(kind), 600);
}

/* ---------- 게임오버 ---------- */
function checkOver() {
  if (state.stress >= 100) {
    clearInterval(tickTimer);
    $("overAvatar").innerHTML = avatarMarkup(state.char);
    show("overScreen");
    return true;
  }
  return false;
}

/* ---------- 상호작용 ---------- */
const EFFECTS = {
  feed:     { hunger: -25, tension: +5,                          anim: "bounce" },
  leave:    { stress: -30, loyalty: -8,                          anim: "bounce" },
  praise:   { tension: +15, loyalty: +10,                        anim: "tilt"   },
  overtime: { loyalty: +12, stress: +25, hunger: +15,            anim: "shake"  },
};

function applyEffect(act) {
  const e = EFFECTS[act];
  if (!e) return;
  state.hunger  = clamp(state.hunger  + (e.hunger  || 0));
  state.stress  = clamp(state.stress  + (e.stress  || 0));
  state.tension = clamp(state.tension + (e.tension || 0));
  state.loyalty = clamp(state.loyalty + (e.loyalty || 0));
  animate(e.anim);
  render();
  save();
  checkOver();
}

/* ---------- 30초 자동 변화 ---------- */
function startTick() {
  clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    state.hunger  = clamp(state.hunger + 8);   // 배고픔 상승
    state.tension = clamp(state.tension - 6);  // 텐션 하락
    render();
    save();
    checkOver();
  }, TICK_MS);
}

/* ---------- 게임 시작 ---------- */
function startGame(charOrState) {
  state = typeof charOrState === "string" ? defaultStats(charOrState) : charOrState;
  save();
  render();
  show("gameScreen");
  startTick();
}

/* ---------- 이벤트 ---------- */
document.querySelectorAll(".pick-card").forEach(card => {
  card.addEventListener("click", () => startGame(card.dataset.char));
});
document.querySelectorAll(".act").forEach(btn => {
  btn.addEventListener("click", () => applyEffect(btn.dataset.act));
});
$("btnReset").addEventListener("click", () => {
  clearInterval(tickTimer);
  localStorage.removeItem(STORE_KEY);
  state = null;
  show("selectScreen");
});
$("btnRestart").addEventListener("click", () => {
  const char = state ? state.char : "sasu";
  startGame(char);
});

/* ---------- 초기화 ---------- */
$("pickSasu").innerHTML = avatarMarkup("sasu");
$("pickBusasu").innerHTML = avatarMarkup("busasu");
probeAssets();   // sasu.png / busasu.png 있으면 자동으로 실제 이미지로 교체

const saved = load();
if (saved && saved.char) {
  if (saved.stress >= 100) { startGame(saved.char); }  // 바로 재시작 가능
  else startGame(saved);
} else {
  show("selectScreen");
}
</script>
