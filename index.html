<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>꼬직 놀이터</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --cream:#FBF6EC; --ivory:#FFFDF8; --beige:#D9C7A7; --beige-text:#B0854A;
    --warmgray:#8E8A86; --warmgray-text:#6F6B67; --blush:#F5A9B0; --ink:#4A423A; --ink-soft:#8B8177;
    --shadow:22px 22px 44px rgba(158,138,102,.18),-10px -10px 26px rgba(255,255,255,.9);
    --shadow-sm:8px 8px 18px rgba(158,138,102,.16),-5px -5px 12px rgba(255,255,255,.85);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(circle at 28% 12%,#FFFDF8 0%,transparent 55%),radial-gradient(circle at 82% 92%,#F5EDDC 0%,transparent 50%),var(--cream);}
  body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:12px;}
  .phone{position:relative;width:min(430px,96vw);aspect-ratio:9/16;max-height:96dvh;
    background:linear-gradient(160deg,var(--ivory),var(--cream));border-radius:40px;box-shadow:var(--shadow);
    overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 26px;text-align:center;}
  .kicker{font-size:13px;font-weight:700;color:var(--beige-text);background:#F3E9D5;padding:7px 16px;border-radius:999px;}
  h1{font-size:32px;font-weight:800;letter-spacing:-.8px;margin-top:16px;}
  .sub{color:var(--ink-soft);font-size:14.5px;font-weight:500;margin-top:10px;line-height:1.5;}
  .menu{width:100%;display:flex;flex-direction:column;gap:16px;margin-top:34px;}
  .card{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--ivory);
    border-radius:24px;padding:20px 20px;box-shadow:var(--shadow-sm);transition:transform .14s ease;}
  .card:active{transform:scale(.96);}
  .card .ic{flex-shrink:0;width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;}
  .card.test .ic{background:linear-gradient(150deg,var(--beige),#C4AE86);}
  .card.game .ic{background:linear-gradient(150deg,var(--warmgray),#6F6B67);}
  .card .tx{text-align:left;}
  .card .tt{font-size:17px;font-weight:800;}
  .card .ds{font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-top:3px;}
  .foot{margin-top:30px;font-size:12px;color:var(--ink-soft);font-weight:600;opacity:.8;}
</style>
</head>
<body>
  <div class="phone">
    <span class="kicker">꼬직 놀이터</span>
    <h1>꼬직 미니 게임</h1>
    <p class="sub">회사원 캐릭터 빠글이 &amp; 심은하와<br>놀아보는 미니 웹앱 모음</p>
    <div class="menu">
      <a class="card test" href="ccojik-test/">
        <div class="ic">📋</div>
        <div class="tx"><div class="tt">직장인 유형 테스트</div><div class="ds">나는 빠글이형? 은하형? · 1분 소요</div></div>
      </a>
      <a class="card game" href="ccojik-tamagotchi/">
        <div class="ic">🐣</div>
        <div class="tx"><div class="tt">꼬직 다마고치</div><div class="ds">사수·부사수 키우기 게임</div></div>
      </a>
    </div>
    <p class="foot">@ccojik.dh</p>
  </div>
</body>
</html>
