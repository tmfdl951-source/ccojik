<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>꼬직 직장인 유형 테스트</title>
<!-- OG / 공유 미리보기 -->
<meta property="og:type" content="website" />
<meta property="og:title" content="회사에서 진짜 내 모습은? · 직장인 본능 유형 테스트" />
<meta property="og:description" content="회사 진심 vs 워라밸, 나는 어느 쪽? 1분이면 끝나는 8유형 테스트" />
<meta property="og:image" content="./assets/og.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="회사에서 진짜 내 모습은? · 직장인 본능 유형 테스트" />
<meta name="twitter:description" content="회사 진심 vs 워라밸, 나는 어느 쪽? 1분이면 끝나는 8유형 테스트" />
<meta name="twitter:image" content="./assets/og.png" />
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --cream: #FBF6EC;
    --ivory: #FFFDF8;
    --beige: #D9C7A7;
    --beige-text: #B0854A;
    --warmgray: #8E8A86;
    --warmgray-text: #6F6B67;
    --blush: #F5A9B0;
    --ink: #4A423A;
    --ink-soft: #8B8177;
    --shadow: 22px 22px 44px rgba(158,138,102,.18), -10px -10px 26px rgba(255,255,255,.9);
    --shadow-sm: 8px 8px 18px rgba(158,138,102,.16), -5px -5px 12px rgba(255,255,255,.85);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 28% 12%, #FFFDF8 0%, transparent 55%),
      radial-gradient(circle at 82% 92%, #F5EDDC 0%, transparent 50%),
      var(--cream);
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 12px; }

  .phone {
    position: relative;
    width: min(430px, 96vw);
    aspect-ratio: 9 / 16;
    max-height: 96dvh;
    background: linear-gradient(160deg, var(--ivory), var(--cream));
    border-radius: 40px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 30px 26px;
    opacity: 0; pointer-events: none;
    transform: scale(.985);
    transition: opacity .35s ease, transform .35s ease;
    overflow-y: auto; -webkit-overflow-scrolling: touch;  /* 짧은 세로 기기에서 내용 넘치면 스크롤 */
  }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

  /* ===== 시작 화면 ===== */
  #startScreen { align-items: center; justify-content: safe center; text-align: center; gap: 6px; }
  .kicker {
    font-size: 13px; font-weight: 700; color: var(--beige-text);
    background: #F3E9D5; padding: 7px 16px; border-radius: 999px; letter-spacing: .3px;
  }
  h1 { font-size: 30px; font-weight: 800; letter-spacing: -.8px; line-height: 1.3; margin-top: 16px; }
  h1 .hl { color: var(--beige-text); }
  h1 .hl2 { color: var(--warmgray-text); }
  .desc { color: var(--ink-soft); font-size: 14.5px; font-weight: 500; margin-top: 12px; line-height: 1.5; }

  .duo { display: flex; gap: 10px; margin: 26px 0 8px; }
  .duo .char-card {
    background: var(--ivory); border-radius: 26px; padding: 14px 10px 12px;
    box-shadow: var(--shadow-sm); width: 128px;
  }
  .char { width: 96px; height: 96px; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; }
  .char img { width: 100%; height: 100%; object-fit: contain; }
  .char .ph { display: none; font-size: 56px; }
  .char-card .nm { font-weight: 800; font-size: 15px; }
  .char-card .rl { font-size: 11.5px; color: var(--ink-soft); font-weight: 500; margin-top: 2px; }
  /* 시작화면: 두 캐릭터가 좌우로 기운 채 둥실 (서로 반대 위상) */
  .duo .char-card:nth-child(1) .char { animation: floatL 3.6s ease-in-out infinite; }
  .duo .char-card:nth-child(2) .char { animation: floatR 4.2s ease-in-out infinite; }
  @keyframes floatL { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-11px) rotate(-8deg); } }
  @keyframes floatR { 0%,100% { transform: translateY(-4px) rotate(5deg); } 50% { transform: translateY(8px) rotate(8deg); } }

  .cta {
    margin-top: 22px; border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(160deg, var(--beige), #C4AE86);
    color: #fff; font-weight: 800; font-size: 18px;
    padding: 17px 46px; border-radius: 22px; box-shadow: var(--shadow-sm);
    transition: transform .14s ease;
  }
  .cta:active { transform: scale(.95); }
  .time-note { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; margin-top: 14px; }
  .time-note::before { content: "⏱ "; }

  /* ===== 질문 화면 ===== */
  #quizScreen { padding-top: 26px; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .progress-track { flex: 1; height: 12px; background: #EFE7D6; border-radius: 999px; overflow: hidden;
    box-shadow: inset 2px 2px 5px rgba(158,138,102,.15), inset -2px -2px 4px rgba(255,255,255,.7); }
  .progress-fill { height: 100%; width: 10%; border-radius: 999px;
    background: linear-gradient(90deg, var(--beige), #C4AE86); transition: width .55s cubic-bezier(.3,.9,.4,1); }
  .progress-num { font-size: 13px; font-weight: 800; color: var(--ink-soft); min-width: 40px; text-align: right; }

  .q-body { flex: 1; display: flex; flex-direction: column; justify-content: safe center; }
  .q-slide { animation: slideIn .42s cubic-bezier(.22,.8,.3,1); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(58px); } to { opacity: 1; transform: translateX(0); } }

  .q-index { font-size: 14px; font-weight: 800; color: var(--beige-text); }
  .q-text { font-size: 22px; font-weight: 800; line-height: 1.45; margin: 8px 0 20px; letter-spacing: -.4px; }

  .choices { display: flex; flex-direction: column; gap: 11px; }
  .choice {
    text-align: left; border: none; cursor: pointer; font-family: inherit;
    background: var(--ivory); border-radius: 20px; padding: 16px 16px;
    box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 13px;
    transition: transform .16s ease, box-shadow .16s ease, opacity .22s ease;
  }
  .choice:active { transform: scale(.96);
    box-shadow: inset 5px 5px 12px rgba(158,138,102,.16), inset -4px -4px 10px rgba(255,255,255,.75); }
  /* 선택 순간: 눌린 채 유지 + 포인트 컬러 링, 나머지 선택지는 흐려짐 */
  .choice.selected { transform: scale(.96); }
  .choice.a.selected { box-shadow: 0 0 0 3px var(--beige), var(--shadow-sm); }
  .choice.b.selected { box-shadow: 0 0 0 3px var(--blush), var(--shadow-sm); }
  .choice.c.selected { box-shadow: 0 0 0 3px var(--warmgray), var(--shadow-sm); }
  .choices.locked .choice:not(.selected) { opacity: .4; transform: scale(.985); }
  .choices.locked .choice { cursor: default; }
  .choice .tag {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff;
  }
  .choice.a .tag { background: linear-gradient(150deg, var(--beige), #C4AE86); }
  .choice.b .tag { background: linear-gradient(150deg, #F5C0C5, var(--blush)); }
  .choice.c .tag { background: linear-gradient(150deg, var(--warmgray), #6F6B67); }
  .choice .ctext { flex: 1; min-width: 0; font-size: 15px; font-weight: 600; line-height: 1.45; }

  /* ===== 로딩 화면 ===== */
  #loadScreen { align-items: center; justify-content: safe center; text-align: center; gap: 22px; }
  .spinner {
    width: 74px; height: 74px; border-radius: 50%;
    border: 8px solid #EFE7D6; border-top-color: var(--beige);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadScreen .lt { font-size: 19px; font-weight: 800; }
  #loadScreen .ls { font-size: 13.5px; color: var(--ink-soft); font-weight: 500; }
  .dots::after { content: ""; animation: dots 1.4s steps(4,end) infinite; }
  @keyframes dots { 0%{content:"";} 25%{content:".";} 50%{content:"..";} 75%{content:"...";} 100%{content:"";} }
  /* 분석 게이지 (겉모습축/속마음축) — 로딩 화면이 활성화되면 차오름 */
  .analyze { width: 100%; max-width: 264px; display: flex; flex-direction: column; gap: 15px; }
  .ag { text-align: left; }
  .ag-top { display: flex; justify-content: space-between; align-items: baseline; }
  .agl { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .agp { font-size: 11px; font-weight: 800; color: var(--ink-soft); opacity: .7; }
  .agt { height: 13px; margin-top: 6px; background: #EFE7D6; border-radius: 999px; overflow: hidden;
    box-shadow: inset 2px 2px 5px rgba(158,138,102,.15), inset -2px -2px 4px rgba(255,255,255,.7); }
  .agf { height: 100%; width: 0; border-radius: 999px; }
  .agf.outer { background: linear-gradient(90deg, var(--beige), #C4AE86); }
  .agf.inner { background: linear-gradient(90deg, var(--warmgray), #6F6B67); }
  #loadScreen.active .agf.outer { animation: fillGauge 1.7s cubic-bezier(.3,.9,.4,1) .1s forwards; }
  #loadScreen.active .agf.inner { animation: fillGauge 1.7s cubic-bezier(.3,.9,.4,1) .45s forwards; }
  @keyframes fillGauge { from { width: 0; } to { width: 100%; } }

  /* ===== 결과 화면 ===== */
  #resultScreen { padding: 24px 22px; overflow-y: auto; }
  #resultScreen::-webkit-scrollbar { display: none; }
  .r-top { text-align: center; background: var(--ivory); border-radius: 22px;
    padding: 16px 14px 18px; box-shadow: var(--shadow-sm); transform-origin: center; }
  .r-kicker { font-size: 13px; font-weight: 700; color: var(--ink-soft); }
  .r-name { font-size: 30px; font-weight: 800; letter-spacing: -.6px; margin-top: 6px; }
  .r-img-wrap { position: relative; width: 210px; height: 210px; margin: 14px auto 6px; }
  .r-img-wrap .main { width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(8px 14px 18px rgba(158,138,102,.28));
    animation: bounceUp .8s cubic-bezier(.28,.84,.42,1) both, floaty 3.4s ease-in-out .8s infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);} }
  @keyframes bounceUp {
    0%   { transform: translateY(135%) scale(.8); opacity: 0; }
    55%  { transform: translateY(-14%) scale(1.07); opacity: 1; }
    75%  { transform: translateY(5%) scale(.98); }
    100% { transform: translateY(0) scale(1); }
  }
  /* 결과 화면 활성화 시 순차 등장 연출 */
  #resultScreen.active .r-top { animation: flipIn .72s cubic-bezier(.3,.8,.4,1) both; }
  #resultScreen.active .r-quote   { animation: riseIn .5s ease .55s both; }
  #resultScreen.active .r-desc    { animation: riseIn .5s ease .7s both; }
  #resultScreen.active .r-tags    { animation: riseIn .5s ease .85s both; }
  #resultScreen.active .compat    { animation: riseIn .5s ease .95s both; }
  #resultScreen.active .r-actions { animation: riseIn .5s ease 1.1s both; }
  @keyframes flipIn {
    0%   { transform: perspective(600px) rotateX(90deg); opacity: 0; }
    60%  { transform: perspective(600px) rotateX(-12deg); opacity: 1; }
    100% { transform: perspective(600px) rotateX(0); }
  }
  @keyframes riseIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .r-img-wrap .sub { position: absolute; right: -6px; bottom: 4px; width: 92px; height: 92px;
    object-fit: contain; filter: drop-shadow(5px 8px 12px rgba(158,138,102,.3)); }
  .r-quote { text-align: center; font-size: 17px; font-weight: 800; margin: 8px 0 4px; }
  .r-quote::before { content: "“"; } .r-quote::after { content: "”"; }
  .r-desc {
    background: var(--ivory); border-radius: 22px; padding: 18px 18px; margin-top: 14px;
    box-shadow: var(--shadow-sm); font-size: 14.5px; line-height: 1.65; color: #5c5349; font-weight: 500;
  }
  .r-tags { margin-top: 14px; text-align: center; font-size: 14px; font-weight: 800; color: var(--beige-text); letter-spacing: .2px; }

  /* 동료 궁합 (웹 화면 전용) */
  .compat { margin-top: 22px; }
  .compat-title { text-align: center; font-size: 16px; font-weight: 800; color: var(--ink); margin-bottom: 12px; }
  .compat-title::before { content: "🤝 "; }
  .compat-cards { display: flex; flex-direction: column; gap: 10px; }
  .compat-card { background: var(--ivory); border-radius: 20px; padding: 14px 15px;
    box-shadow: var(--shadow-sm); border-left: 5px solid var(--beige); }
  .compat-card.bad { border-left-color: var(--warmgray); }
  .cc-badge { font-size: 12.5px; font-weight: 800; color: var(--beige-text); margin-bottom: 9px; }
  .compat-card.bad .cc-badge { color: var(--warmgray-text); }
  .cc-body { display: flex; align-items: center; gap: 12px; }
  .cc-char { flex-shrink: 0; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
    background: var(--cream); border-radius: 15px; }
  .cc-char img { width: 100%; height: 100%; object-fit: contain; }
  .cc-txt { text-align: left; }
  .cc-name { font-size: 14px; font-weight: 800; }
  .cc-desc { font-size: 12.5px; font-weight: 500; color: #5c5349; line-height: 1.5; margin-top: 3px; }
  .compat-foot { text-align: center; font-size: 12.5px; font-weight: 700; color: var(--ink-soft); margin-top: 13px; }
  .compat-foot::before { content: "👀 "; }

  .r-actions { display: flex; gap: 12px; margin-top: 22px; }
  .r-btn {
    flex: 1; border: none; cursor: pointer; font-family: inherit; font-weight: 800; font-size: 15px;
    padding: 16px 10px; border-radius: 20px; box-shadow: var(--shadow-sm); transition: transform .13s ease;
  }
  .r-btn:active { transform: scale(.95); }
  .r-btn .ic { margin-right: 5px; }
  .r-btn.save  { background: linear-gradient(160deg, var(--beige), #C4AE86); color: #fff; }
  .r-btn.save2 { background: linear-gradient(160deg, var(--warmgray), #6F6B67); color: #fff; }
  .r-btn.share { background: var(--ivory); color: var(--ink); box-shadow: var(--shadow-sm), 0 0 0 2px var(--beige) inset; }
  .r-actions.stacked { margin-top: 12px; }
  .r-btn.restart {
    width: 100%; margin-top: 14px;
    background: linear-gradient(160deg, #F5D9DD, var(--blush)); color: #fff;
    font-size: 16px; padding: 17px 10px;
  }
  .r-btn.kaltoe-link {
    display: block; width: 100%; margin-top: 12px; text-decoration: none; text-align: center;
    background: linear-gradient(160deg, var(--warmgray), #6F6B67); color: #fff; box-sizing: border-box;
    box-shadow: var(--shadow-sm); font-size: 15.5px; padding: 16px 10px;
  }
  .r-btn.kaltoe-link:active { transform: scale(.96); }

  /* 토스트 */
  .toast {
    position: absolute; left: 50%; bottom: 34px; transform: translate(-50%, 20px);
    background: rgba(74,66,58,.94); color: #fff; font-size: 14px; font-weight: 700;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 8px 22px rgba(0,0,0,.22);
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* iOS 저장 안내 모달 (다운로드가 새 탭으로 열리는 사파리 대응) */
  .save-modal {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(74,66,58,.62); backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center; padding: 22px;
  }
  .save-modal.show { display: flex; }
  .save-modal-inner {
    background: var(--ivory); border-radius: 24px; padding: 20px 18px 18px;
    box-shadow: var(--shadow); max-width: 100%; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    max-height: 100%; overflow-y: auto;
  }
  .sm-title { font-size: 16px; font-weight: 800; color: var(--ink); }
  .sm-title::before { content: "👆 "; }
  .sm-sub { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); line-height: 1.5; margin-bottom: 10px; }
  #saveModalImg { width: 100%; max-width: 260px; height: auto; border-radius: 14px;
    box-shadow: var(--shadow-sm); display: block; }
  .sm-close {
    margin-top: 14px; border: none; cursor: pointer; font-family: inherit; font-weight: 800; font-size: 14px;
    background: var(--ivory); color: var(--ink); padding: 11px 30px; border-radius: 16px;
    box-shadow: var(--shadow-sm);
  }
  .sm-close:active { transform: scale(.95); }

  .save-hint { text-align: center; font-size: 11.5px; color: var(--ink-soft); margin-top: 12px; opacity: .8; line-height:1.5; }
</style>
</head>
<body>
<div class="phone">

  <!-- 시작 -->
  <section class="screen active" id="startScreen">
    <span class="kicker">직장인 본능 유형 테스트</span>
    <h1>회사에서<br><span class="hl">진짜 내 모습</span>은?</h1>
    <p class="desc">회사 진심러 vs 워라밸러,<br>10개 질문으로 알아보는 나의 직장인 본능</p>
    <div class="duo">
      <div class="char-card">
        <div class="char"><img src="./assets/ppaguli.png" alt="회사 텐션러" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ph">🧑‍🦱</span></div>
        <div class="nm">회사 진심러</div><div class="rl">텐션·추진력 담당</div>
      </div>
      <div class="char-card">
        <div class="char"><img src="./assets/eunha.png" alt="워라밸러" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ph">🧑</span></div>
        <div class="nm">워라밸러</div><div class="rl">칼퇴·마이웨이 담당</div>
      </div>
    </div>
    <button class="cta" id="startBtn">테스트 시작</button>
    <p class="time-note">소요시간 1분</p>
  </section>

  <!-- 질문 -->
  <section class="screen" id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-num" id="progressNum">1/10</span>
    </div>
    <div class="q-body"><div id="qContent"></div></div>
  </section>

  <!-- 로딩 -->
  <section class="screen" id="loadScreen">
    <div class="spinner"></div>
    <div>
      <div class="lt">당신의 직장인 자아 분석중<span class="dots"></span></div>
      <div class="ls">잠시만 기다려주세요</div>
    </div>
    <div class="analyze">
      <div class="ag">
        <div class="ag-top"><span class="agl">겉모습축</span><span class="agp">분석중</span></div>
        <div class="agt"><div class="agf outer"></div></div>
      </div>
      <div class="ag">
        <div class="ag-top"><span class="agl">속마음축</span><span class="agp">분석중</span></div>
        <div class="agt"><div class="agf inner"></div></div>
      </div>
    </div>
  </section>

  <!-- 결과 -->
  <section class="screen" id="resultScreen">
    <div class="r-top">
      <div class="r-kicker">나의 직장인 유형은</div>
      <div class="r-name" id="rName"></div>
    </div>
    <div class="r-img-wrap" id="rImgWrap"></div>
    <div class="r-quote" id="rQuote"></div>
    <div class="r-desc" id="rDesc"></div>
    <div class="r-tags" id="rTags"></div>

    <div class="compat" id="compat">
      <div class="compat-title">동료 궁합</div>
      <div class="compat-cards">
        <div class="compat-card good">
          <div class="cc-badge">💛 환상의 짝꿍</div>
          <div class="cc-body">
            <div class="cc-char" id="ccGoodImg"></div>
            <div class="cc-txt"><div class="cc-name" id="ccGoodName"></div><div class="cc-desc" id="ccGoodDesc"></div></div>
          </div>
        </div>
        <div class="compat-card bad">

/* ---------- 상태 ---------- */
let current = 0;              // 0~9
const answers = new Array(10).fill(null);  // 'A' or 'B'
let result = null;
let resultKey = null;         // 공유 URL용 유형 키 (pp/ee/pe/ep)

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

// 선택지 글자가 두 줄로 넘치면 폰트를 살짝 줄여 한 줄에 맞춤 (최소 12px)
function fitChoiceText() {
  $("qContent").querySelectorAll(".ctext").forEach(el => {
    el.style.whiteSpace = "nowrap";
    let size = 15;
    el.style.fontSize = size + "px";
    while (el.scrollWidth > el.clientWidth && size > 12) {
      size -= 0.5;
      el.style.fontSize = size + "px";
    }
    if (el.scrollWidth > el.clientWidth) el.style.whiteSpace = "normal";  // 최소치로도 안 되면 줄바꿈 허용
  });
}

/* ---------- 질문 렌더 ---------- */
function renderQuestion() {
  const q = QUESTIONS[current];
  $("progressFill").style.width = ((current + 1) / 10 * 100) + "%";
  $("progressNum").textContent = (current + 1) + "/10";
  $("qContent").innerHTML = `
    <div class="q-slide">
      <div class="q-index">Q${current + 1}.</div>
      <div class="q-text">${q.q}</div>
      <div class="choices">
        <button class="choice a" data-ans="A"><span class="tag">A</span><span class="ctext">${q.a}</span></button>
        <button class="choice b" data-ans="B"><span class="tag">B</span><span class="ctext">${q.b}</span></button>
        <button class="choice c" data-ans="C"><span class="tag">C</span><span class="ctext">${q.c}</span></button>
      </div>
    </div>`;
  requestAnimationFrame(fitChoiceText);  // 두 줄로 넘치는 선택지는 폰트 살짝 축소해 한 줄 유지
  let picked = false;  // 연출용 잠금 (판정 로직과 무관)
  const choicesEl = $("qContent").querySelector(".choices");
  $("qContent").querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      if (picked) return;
      picked = true;
      btn.classList.add("selected");
      choicesEl.classList.add("locked");
      setTimeout(() => choose(btn.dataset.ans), 320);  // 눌림·선택 표시 후 전환
    });
  });
}

function choose(ans) {
  answers[current] = ans;
  if (current < 9) {
    current++;
    renderQuestion();
  } else {
    finish();
  }
}

/* ---------- 판정 (3지선다 점수 → 8유형: 방향 + 강도) ---------- */
function computeResult() {
  const pt = a => a === "A" ? 2 : a === "B" ? 1 : 0;                    // A=2 B=1 C=0 (빠글 점수)
  const sum = arr => arr.reduce((s, a) => s + pt(a), 0);
  const outer = sum(answers.slice(0, 5));    // 겉모습축 합계 0~10
  const inner = sum(answers.slice(5, 10));   // 속마음축 합계 0~10
  const dir = s => s >= 6 ? "p" : "e";        // 6~10 빠글 / 0~5 은하
  const strong = s => s >= 8 || s <= 2;       // 8~10·0~2 강 / 3~7 약
  const fam = dir(outer) + dir(inner);        // pp/ee/pe/ep
  const bothStrong = strong(outer) && strong(inner);
  resultKey = fam + "_" + (bothStrong ? "strong" : "soft");
  return RESULTS[resultKey];
}

function finish() {
  result = computeResult();
  show("loadScreen");
  setTimeout(renderResult, 2000);  // 게이지 차오르는 연출 시간 확보
}

/* ---------- 결과 렌더 ---------- */
function charMarkup(key, cls) {
  return `<img class="${cls}" src="${IMG_SRC[key]}" alt=""
    onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${EMOJI[key]}',className:'${cls}',style:'font-size:120px'}))">`;
}
// 동료 궁합 렌더 (웹 화면 전용) — 8유형을 4계열로 묶어 표시
function renderCompat() {
  const fam = resultKey ? resultKey.split("_")[0] : null;  // pp/ee/pe/ep
  const c = fam && COMPAT[fam];
  if (!c) { $("compat").style.display = "none"; return; }
  $("compat").style.display = "";
  const fill = (which, data) => {
    const f = FAMILY[data.key];
    $("cc" + which + "Img").innerHTML =
      `<img src="${IMG_SRC[f.main]}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${EMOJI[f.main]}',style:'font-size:32px'}))">`;
    const nameEl = $("cc" + which + "Name");
    nameEl.textContent = f.name;
    nameEl.style.color = f.color;
    $("cc" + which + "Desc").textContent = data.text;
  };
  fill("Good", c.good);
  fill("Bad", c.bad);
}
function renderResult() {
  const r = result;
  $("rName").textContent = r.name;
  $("rName").style.color = r.color;
  let imgs = charMarkup(r.main, "main");
  if (r.sub) imgs += charMarkup(r.sub, "sub");
  $("rImgWrap").innerHTML = imgs;
  $("rQuote").textContent = r.quote;
  $("rDesc").textContent = r.desc;
  $("rTags").textContent = r.tags;
  $("rTags").style.color = r.color;
  renderCompat();
  // 진입 경로에 맞춘 재시작 버튼 라벨
  $("restartBtn").textContent = cameFromURL ? "나도 테스트하기" : "다시하기";
  // 결과별 공유 URL 반영
  if (resultKey) history.replaceState(null, "", location.pathname + "?result=" + resultKey);
  show("resultScreen");
  $("resultScreen").scrollTop = 0;
}

/* ---------- Canvas 결과 카드 (1080x1920) ---------- */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// 가운데 정렬 줄바꿈. 반환: 마지막 줄 다음 y
function wrapCenter(ctx, text, cx, y, maxW, lh) {
  const chars = [...text];
  let line = "";
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxW && line !== "") {
      ctx.fillText(line, cx, y);
      y += lh;
      line = chars[i];
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, cx, y); y += lh; }
  return y;
}
function drawImageContain(ctx, img, cx, cy, boxW, boxH) {
  const scale = Math.min(boxW / img.width, boxH / img.height);
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, cx - w / 2, cy - h / 2, w, h);
}

// 카드 2종 레이아웃 (스토리 1080x1920 / 피드 1080x1350)
const CARD_LAYOUTS = {
  story: { W:1080, H:1920, subY:250, nameY:380, nameFont:96, imgCy:700, imgBox:560, subBox:260, subDx:210, subDy:150,
           quoteY:1090, quoteFont:54, quoteLH:70, quoteMaxW:900,
           descY:1210, descFont:42, descLH:64, descMaxW:880,
           tagsFont:40, tagsLH:56, tagsMaxW:920, tagsMinY:1560,
           wm1Y:1770, wm1Font:50, wm2Y:1830, wm2Font:38 },
  feed:  { W:1080, H:1350, subY:160, nameY:262, nameFont:82, imgCy:480, imgBox:360, subBox:175, subDx:150, subDy:105,
           quoteY:762, quoteFont:44, quoteLH:58, quoteMaxW:900,
           descY:868, descFont:31, descLH:45, descMaxW:920,
           tagsFont:32, tagsLH:46, tagsMaxW:940, tagsMinY:1112,
           wm1Y:1198, wm1Font:44, wm2Y:1252, wm2Font:32 },
};

async function buildCard(mode) {
  const L = CARD_LAYOUTS[mode] || CARD_LAYOUTS.story;
  const r = result;
  const W = L.W, H = L.H;
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  ctx.textAlign = "center";

  try { await document.fonts.ready; } catch (e) {}
  const FF = '"Pretendard Variable", Pretendard, sans-serif';

  // 배경 크림
  ctx.fillStyle = "#FBF6EC";
  ctx.fillRect(0, 0, W, H);

  // 상단 포인트 밴드 (그라데이션 or 단색)
  let band;
  if (r.grad) {
    band = ctx.createLinearGradient(0, 0, W, 0);
    band.addColorStop(0, r.grad[0]); band.addColorStop(1, r.grad[1]);
  } else {
    band = r.main === "ppaguli" ? "#D9C7A7" : "#8E8A86";
  }
  ctx.fillStyle = band;
  ctx.fillRect(0, 0, W, 16);

  // 카드 패널
  ctx.save();
  ctx.shadowColor = "rgba(158,138,102,.22)";
  ctx.shadowBlur = 50; ctx.shadowOffsetY = 24;
  ctx.fillStyle = "#FFFDF8";
  roundRect(ctx, 60, 90, W - 120, H - 180, 70);
  ctx.fill();
  ctx.restore();

  const cx = W / 2;

  // 소제목
  ctx.fillStyle = "#8B8177";
  ctx.font = "600 44px " + FF;
  ctx.fillText("직장인 유형 테스트", cx, L.subY);

  // 유형명 (그라데이션 or 단색)
  let nameFill = r.color;
  if (r.grad) {
    const g = ctx.createLinearGradient(200, 0, 880, 0);
    g.addColorStop(0, r.grad[0] === "#D9C7A7" ? "#B0854A" : "#6F6B67");
    g.addColorStop(1, r.grad[1] === "#8E8A86" ? "#6F6B67" : "#B0854A");
    nameFill = g;
  }
  ctx.fillStyle = nameFill;
  ctx.font = "800 " + L.nameFont + "px " + FF;
  ctx.fillText(r.name, cx, L.nameY);

  // 캐릭터 이미지
  const main = loadedImg[r.main];
  const sub = r.sub ? loadedImg[r.sub] : null;
  if (main) {
    drawImageContain(ctx, main, sub ? cx - 40 : cx, L.imgCy, L.imgBox, L.imgBox);
    if (sub) drawImageContain(ctx, sub, cx + L.subDx, L.imgCy + L.subDy, L.subBox, L.subBox);
  } else {
    ctx.font = Math.round(L.imgBox * 0.55) + "px " + FF;
    ctx.fillText(EMOJI[r.main], cx, L.imgCy + L.imgBox * 0.18);
  }

  // 인용구
  ctx.fillStyle = "#4A423A";
  ctx.font = "800 " + L.quoteFont + "px " + FF;
  wrapCenter(ctx, "“" + r.quote + "”", cx, L.quoteY, L.quoteMaxW, L.quoteLH);

  // 설명
  ctx.fillStyle = "#5C5349";
  ctx.font = "500 " + L.descFont + "px " + FF;
  let y = wrapCenter(ctx, r.desc, cx, L.descY, L.descMaxW, L.descLH);

  // 해시태그 (설명 아래, 워터마크 위로 위치 제한)
  ctx.fillStyle = r.color;
  ctx.font = "800 " + L.tagsFont + "px " + FF;
  const tagsY = Math.min(Math.max(y + 40, L.tagsMinY), L.wm1Y - 66);
  wrapCenter(ctx, r.tags, cx, tagsY, L.tagsMaxW, L.tagsLH);

  // 하단 워터마크 (두 카드 공통)
  ctx.fillStyle = band;
  ctx.font = "800 " + L.wm1Font + "px " + FF;
  ctx.fillText("@ccojik.dh", cx, L.wm1Y);
  ctx.fillStyle = "#8B8177";
  ctx.font = "600 " + L.wm2Font + "px " + FF;
  ctx.fillText("너의 유형도 테스트해봐", cx, L.wm2Y);

  return cv;
}

// iOS(사파리)는 <a download>를 무시하고 새 탭으로 여니 별도 처리
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);  // iPadOS 데스크탑 모드 포함
function supportsDownload() {
  return !isIOS && typeof document.createElement("a").download !== "undefined";
}

let saveModalURL = null;
function openSaveModal(url) {
  if (saveModalURL) URL.revokeObjectURL(saveModalURL);
  saveModalURL = url;
  $("saveModalImg").src = url;
  $("saveModal").classList.add("show");
}
function closeSaveModal() {
  $("saveModal").classList.remove("show");
  $("saveModalImg").removeAttribute("src");
  if (saveModalURL) { URL.revokeObjectURL(saveModalURL); saveModalURL = null; }
}

async function saveCard(mode) {
  try {
    const cv = await buildCard(mode);
    const label = mode === "feed" ? "피드용" : "스토리용";
    cv.toBlob(blob => {
      if (!blob) { showSaveError(); return; }
      const url = URL.createObjectURL(blob);
      if (!supportsDownload()) {
        // iOS 등: 다운로드가 새 탭으로 열리므로 이미지를 띄워 '꾹 눌러 저장' 유도
        openSaveModal(url);
        $("saveHint").textContent = "";
        return;
      }
      const a = document.createElement("a");
      a.href = url;
      a.download = "ccojik_" + (resultKey || "result") + "_" + mode + ".png";  // ASCII 파일명
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      $("saveHint").textContent = label + " 카드 저장 완료! 📸";
    }, "image/png");
  } catch (e) {
    showSaveError();
  }
}
function showSaveError() {
  $("saveHint").textContent = "저장에 문제가 생겼어요. 화면을 캡처해서 공유해 주세요 🙏";
}

/* ---------- 토스트 ---------- */
let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ---------- 링크 공유 (Web Share → 클립보드 폴백) ---------- */
async function shareResult() {
  const url = location.href;
  if (navigator.share) {
    try {
      await navigator.share({
        title: "나는 빠글이형 사수일까, 심은하형 신입일까?",
        text: "내 직장인 유형은 '" + (result ? result.name : "") + "' — 너도 해봐!",
        url: url,
      });
    } catch (e) { /* 사용자가 취소한 경우 무시 */ }
    return;
  }
  copyToClipboard(url);
}
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast("링크 복사됨"), () => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); toast("링크 복사됨"); }
  catch (e) { toast("복사 실패 — 주소창을 길게 눌러 복사하세요"); }
  ta.remove();
}

/* ---------- 이벤트 ---------- */
function resetTest() {
  current = 0;
  answers.fill(null);
  result = null;
  resultKey = null;
  cameFromURL = false;
  $("saveHint").textContent = "";
  history.replaceState(null, "", location.pathname);  // ?result= 제거
}
$("startBtn").addEventListener("click", () => {
  resetTest();
  show("quizScreen");
  renderQuestion();
});
$("saveStoryBtn").addEventListener("click", () => saveCard("story"));
$("saveFeedBtn").addEventListener("click", () => saveCard("feed"));
$("shareBtn").addEventListener("click", shareResult);
$("saveModalClose").addEventListener("click", closeSaveModal);
$("saveModal").addEventListener("click", (e) => { if (e.target === $("saveModal")) closeSaveModal(); });
$("restartBtn").addEventListener("click", () => {
  resetTest();
  show("startScreen");
});

/* ---------- 공유 링크(?result=키)로 진입 시 결과 화면 바로 표시 ---------- */
(function initFromURL() {
  const key = new URLSearchParams(location.search).get("result");
  if (key && RESULTS[key]) {
    result = RESULTS[key];
    resultKey = key;
    cameFromURL = true;
    renderResult();
  }
})();
</script>
